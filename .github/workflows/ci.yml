name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # kotoba.wgsl re-exports kami.wgsl (kotoba-lang/webgpu) — see CHANGELOG.md — so the sibling
      # checkout is webgpu (+ its own transitive local/root deps) instead of a direct expr checkout.
      - run: git clone --depth 1 https://github.com/kotoba-lang/webgpu.git ../webgpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/org-w3-webgpu.git ../org-w3-webgpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/expr.git ../expr
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test

      - run: clojure -M:lint
